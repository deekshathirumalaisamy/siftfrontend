<!DOCTYPE html>
<html>
<head>
<title>SocialSift Account Management</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial
}
body{
background:#F4F5FB;
padding:30px
}
.header{
background:#5B4BAA;
color:white;
padding:20px;
border-radius:12px;
display:flex;
justify-content:space-between
}
.header button{
background:white;
color:#5B4BAA;
border:0;
padding:10px 20px;
border-radius:8px
}
.container{
background:white;
margin-top:30px;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px #ddd
}
button{
background:#5B4BAA;
color:white;
border:0;
padding:12px 18px;
border-radius:8px;
margin:5px;
cursor:pointer
}
input,select{
width:250px;
padding:10px;
margin:6px;
border:1px solid #ccc;
border-radius:8px
}
.section{
display:none;
margin-top:20px
}
h2{
color:#5B4BAA
}
.update{
background:#43A047
}
.delete{
background:#E53935
}
table{
width:100%;
margin-top:20px;
border-collapse:collapse
}
th{
background:#5B4BAA;
color:white
}
td,th{
padding:10px;
border:1px solid #ddd;
text-align:center
}
.success{
color:green;
font-weight:bold
}
.error{
color:red;
font-weight:bold
}
</style>
</head>

<body>

<div class="header">
<h1>👤 SocialSift Account Management</h1>
<button onclick="location.href='dashboard.html'">
Dashboard
</button>
</div>

<div class="container">

<button onclick="show('add')">ADD ACCOUNT</button>
<button onclick="show('get')">GET ACCOUNT</button>
<button onclick="show('update')">UPDATE ACCOUNT</button>
<button onclick="show('delete')">DELETE ACCOUNT</button>

<p id="msg"></p>

<section id="add" class="section">

<h2>Add Account</h2>

<input id="email" placeholder="Email">
<input id="password" placeholder="Password">

<select id="role">
<option>ADMIN</option>
<option>USER</option>
</select>

<select id="active">
<option value="true">Active</option>
<option value="false">Inactive</option>
</select>

<br>

<button onclick="addAccount()">SAVE ACCOUNT</button>

</section>

<section id="get" class="section">

<h2>Get Account</h2>

<input id="id" placeholder="Account ID">

<br>

<button onclick="getById()">GET BY ID</button>
<button onclick="getAll()">GET ALL</button>

</section>
<section id="update" class="section">

<h2>Update Account</h2>

<input id="uid" placeholder="ID">
<input id="uemail" placeholder="Email">
<input id="upass" placeholder="Password">

<select id="urole">
<option>ADMIN</option>
<option>USER</option>
</select>

<select id="uactive">
<option value="true">Active</option>
<option value="false">Inactive</option>
</select>

<br>

<button class="update" onclick="updateAccount()">UPDATE</button>

</section>

<section id="delete" class="section">

<h2>Delete Account</h2>

<input id="did" placeholder="Account ID">

<br>

<button class="delete" onclick="deleteAccount()">DELETE</button>

</section>

<div id="result"></div>

</div>

<script>

const URL="https://siftbackend-45nr.onrender.com/auth/account";
const token=localStorage.getItem("token");

function show(x){
document.querySelectorAll(".section")
.forEach(s=>s.style.display="none");
document.getElementById(x).style.display="block";
msg.innerHTML="";
}

function message(t,c){
msg.innerHTML=t;
msg.className=c;
}

async function addAccount(){

let data={
email:email.value,
password:password.value,
role:role.value,
active:active.value=="true"
};

let r=await fetch(URL,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify(data)
});

message(
r.ok?"Account Added Successfully":"Add Failed",
r.ok?"success":"error"
);

if(r.ok)getAll();

}

async function getAll(){

let r=await fetch(URL,{
headers:{
"Authorization":"Bearer "+token
}
});

let data=await r.json();

let h=`
<table>
<tr>
<th>ID</th>
<th>Email</th>
<th>Role</th>
<th>Active</th>
</tr>
`;

data.forEach(a=>{

h+=`
<tr>
<td>${a.id}</td>
<td>${a.email}</td>
<td>${a.role}</td>
<td>${a.active}</td>
</tr>
`;

});

h+="</table>";

result.innerHTML=h;

}

async function getById(){

let r=await fetch(URL+"/"+id.value,{
headers:{
"Authorization":"Bearer "+token
}
});

if(r.ok){

let a=await r.json();

result.innerHTML=`
<table>
<tr>
<th>ID</th>
<th>Email</th>
<th>Role</th>
<th>Active</th>
</tr>

<tr>
<td>${a.id}</td>
<td>${a.email}</td>
<td>${a.role}</td>
<td>${a.active}</td>
</tr>

</table>`;

}
else{

message(
"Account Not Found",
"error"
);

}

}

async function updateAccount(){

let id=uid.value;

let data={
email:uemail.value,
password:upass.value,
role:urole.value,
active:uactive.value=="true"
};

let r=await fetch(URL+"/"+id,{
method:"PUT",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify(data)
});

message(
r.ok?"Account Updated Successfully":"Update Failed",
r.ok?"success":"error"
);

if(r.ok)getAll();

}

async function deleteAccount(){

let r=await fetch(URL+"/"+did.value,{
method:"DELETE",
headers:{
"Authorization":"Bearer "+token
}
});

message(
r.ok?"Account Deleted Successfully":"Delete Failed",
r.ok?"success":"error"
);

if(r.ok)getAll();

}

</script>

</body>
</html>
